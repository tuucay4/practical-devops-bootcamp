name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'Week_5/**'

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Week_5/backend
          dockerfile: ./Week_5/backend/dockerfile
          push: true
          tags: tuucay4/ecommerce-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Week_5/frontend
          dockerfile: ./Week_5/frontend/dockerfile
          push: true
          tags: tuucay4/ecommerce-frontend:latest
          
  # Deploy job that runs after build-and-push
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./Week_5/docker-compose.yml,./Week_5/.env.example"
          target: "/home/ubuntu/app"
          strip_components: 1

      - name: Deploy to EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
            cd /home/ubuntu/app/Week_5

            # Pull latest images
            docker compose pull

            # Restart containers with zero downtime
            docker compose up -d --remove-orphans

            # Clean up old images
            docker image prune -f